<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICO - Registrar Pedido</title>
    <link rel="stylesheet" href="style.css"> 
	<script src='script.js'></script>
</head>
<body>
    <div class="header-sico">
        <h1>Registrar Pedido de Venda</h1>
    </div>

    <div class="form-container">
        <form id='pedidoForm' class="pedido-form">
            <div class="section-title">Identificação do Pedido</div>
            
            <div class="input-group">
                <label for="idCliente">ID do Cliente</label>
                <input type="text" id="idCliente" required>
            </div>

            <div class="input-group">
                <label for="idProduto">ID do Produto </label>
                <input type="text" id="idProduto" required>
            </div>
			
			<div class="input-group">
    			<label for="quantidade">Quantidade</label>
    			<input type="number" id="quantidade" value="10" min="1" required> </div>
			<div id="pedido-feedback" class="feedback-message"></div>
			
			 <div class="button-group-footer">
                <button type="submit" class="btn-primary">ADICIONAR AO PEDIDO</button>
            </div>
            
            <div class="section-title">Tabela de Produtos</div>

            <table class="pricing-table">
                <thead>
                    <tr>
						<th>ID Cliente</th>
						<th>ID Produto</th>
						<th>Nome Produto</th>
						<th>Preço Padrão</th>
						<th>Preço Promocional</th>
						<th>Qtd.</th>
						<th>Subtotal</th>
						<th>Ação</th>
                    </tr>
                </thead>
                <tbody id="product-details">
                </tbody>
            </table>
			
			<div class="button-group-footer">
				<button type="button" class="btn-secondary">FINALIZAR VENDA</button>
			</div>
		</form>
    </div>
</body>
</html>
