<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICO - Registrar Movimentação de Estoque</title>
    <link rel="stylesheet" href="style.css"> 
	<script src='script.js'></script>
</head>
<body>
    <div class="header-sico">
        <h1>Registro de Movimentação de Estoque</h1>
    </div>

    <div class="form-container">
        <form class="movimentacao-form">
            <div class="section-title">Detalhes da Transação</div>
            
            <div class="input-group">
                <label for="tipoMovimentacao">Tipo de Movimentação</label>
                <select id="tipoMovimentacao" required>
                    <option value="">Selecione...</option>
                    <option value="ENTRADA">1. ENTRADA (Recebimento)</option>
                    <option value="SAIDA">2. SAÍDA (Expedição Manual)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="idProduto">ID do Produto</label>
                <input type="text" id="idProduto" required>
            </div>

            <div class="input-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" min="1" placeholder="Mínimo 1 unidade" required>
            </div>

            <div class="button-group-footer">
                <button type="submit" class="btn-primary">CONFIRMAR MOVIMENTAÇÃO</button>
            </div>
        </form>
    </div>
</body>
</html>
